name: Build LaTeX document

on: [push]

jobs:
  build_latex:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main/main.tex
          work_in_root_file_dir: true

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: PDF
          path: main/main.pdf
